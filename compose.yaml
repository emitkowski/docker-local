name: docker-local

services:
    nginx-proxy:
        image: 'nginxproxy/nginx-proxy'
        container_name: nginx-proxy
        restart: always
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - '/var/run/docker.sock:/tmp/docker.sock:ro'
            - './proxy/certs:/etc/nginx/certs:ro'
            - './proxy/vhost:/etc/nginx/vhost.d'
        networks:
            - nginx-proxy

    mysql:
        image: 'mysql:8.4'
        container_name: mysql
        restart: always
        ports:
            - '3306:3306'
        environment:
            MYSQL_ROOT_PASSWORD: 'password'
            MYSQL_ROOT_HOST: '%'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
        volumes:
            - './mysql/data:/var/lib/mysql'
        networks:
            - mysql-shared
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-ppassword'
            retries: 3
            timeout: 5s

    redis:
        image: 'redis:alpine'
        container_name: redis
        restart: always
        ports:
            - '6379:6379'
        volumes:
            - 'redis-data:/data'
        networks:
            - redis-shared
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s

    mailpit:
        image: 'axllent/mailpit:latest'
        container_name: mailpit
        restart: always
        ports:
            - '1025:1025'
            - '8025:8025'
        networks:
            - mailpit-shared

networks:
    nginx-proxy:
        name: nginx-proxy
        driver: bridge
    mysql-shared:
        name: mysql-shared
        driver: bridge
    redis-shared:
        name: redis-shared
        driver: bridge
    mailpit-shared:
        name: mailpit-shared
        driver: bridge

volumes:
    redis-data:
        driver: local
